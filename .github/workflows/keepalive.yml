name: Keepalive — Wake Streamlit App

on:
  schedule:
    # runs at midnight, 6 AM, noon, and 6 PM UTC — 4 times a day
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ping Streamlit app
        run: python keepalive.py

      - name: Log result
        if: always()
        run: echo "Keepalive ran at $(date -u)"
